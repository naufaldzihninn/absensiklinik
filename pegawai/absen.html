<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0F172A">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Absensi — Klinik Prima Insani">
    <title>Absensi — Klinik Prima Insani</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="../shared/assets/logo.png">
    <link rel="apple-touch-icon" href="../shared/assets/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Camera Screen -->
    <div class="camera-container" id="cameraScreen">
        <video id="cameraFeed" class="camera-video" autoplay playsinline></video>

        <div class="camera-overlay">
            <div class="face-guide"></div>
            <p class="camera-guide-text" id="cameraGuideText">Posisikan wajah Anda di dalam lingkaran</p>
        </div>

        <div class="camera-header">
            <button class="camera-close-btn" id="backBtn">←</button>
            <span style="color: white; font-size: 0.85rem; font-weight: 600;" id="absenTypeLabel">Clock In</span>
            <div style="width: 40px;"></div>
        </div>

        <div class="camera-controls">
            <button class="capture-btn" id="captureBtn"></button>
        </div>
    </div>

    <!-- Processing Screen -->
    <div class="loading-overlay" id="processingScreen" style="display: none;">
        <div class="spinner" style="width: 48px; height: 48px; border-width: 4px;"></div>
        <div class="loading-text" id="processingText">Memverifikasi wajah...</div>
    </div>

    <!-- Result Screen: Success -->
    <div class="success-screen" id="successScreen" style="display: none;">
        <div class="success-icon">✓</div>
        <h2 id="successTitle">Absensi Berhasil!</h2>
        <p class="text-secondary" style="margin-top: 8px;" id="successDetail"></p>

        <div class="glass-card" style="margin-top: 24px; width: 100%; max-width: 320px;">
            <div class="flex justify-between mb-sm">
                <span class="text-secondary text-sm">Shift</span>
                <span class="text-sm" style="font-weight: 600;" id="resultShift">-</span>
            </div>
            <div class="flex justify-between mb-sm">
                <span class="text-secondary text-sm">Waktu</span>
                <span class="text-sm" style="font-weight: 600;" id="resultTime">-</span>
            </div>
            <div class="flex justify-between mb-sm">
                <span class="text-secondary text-sm">Status</span>
                <span id="resultStatus">-</span>
            </div>
            <div class="flex justify-between">
                <span class="text-secondary text-sm">Akurasi AI</span>
                <span class="text-sm" style="font-weight: 600; color: var(--success);" id="resultAkurasi">-</span>
            </div>
        </div>

        <button class="btn btn-primary btn-lg" id="successDashboardBtn" style="margin-top: 24px;">
            Kembali ke Beranda
        </button>
    </div>

    <!-- Result Screen: Failed -->
    <div class="success-screen" id="failScreen" style="display: none;">
        <div class="fail-icon">✕</div>
        <h2>Verifikasi Gagal</h2>
        <p class="text-secondary" style="margin-top: 8px; max-width: 280px;" id="failDetail">
            Wajah tidak cocok dengan data terdaftar. Silakan coba lagi.
        </p>
        <div style="display: flex; gap: 12px; margin-top: 24px;">
            <button class="btn btn-secondary" id="failDashboardBtn">Kembali</button>
            <button class="btn btn-primary" id="retryCaptureBtn">Coba Lagi</button>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/api.js"></script>
    <script src="js/camera.js"></script>
    <script src="js/geolocation.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="js/face.js"></script>
    <script src="js/absen.js"></script>
</body>

</html>
