<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Pengaturan Klinik — Admin Klinik Prima Insani">
    <title>Pengaturan — Admin Klinik Prima Insani</title>
    <link rel="icon" type="image/png" href="../shared/assets/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>
    <div id="sidebarContainer"></div>

    <div class="main-content">
        <div id="topBarContainer"></div>

        <div class="page-container">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">

                <!-- Clinic Location Settings -->
                <div class="panel">
                    <div class="panel-header">
                        <h3 class="panel-title">📍 Lokasi Klinik</h3>
                    </div>
                    <div class="panel-body">
                        <div class="admin-form-group">
                            <label class="admin-form-label">Nama Klinik</label>
                            <input type="text" id="clinicName" class="admin-form-input" value="Klinik Prima Insani">
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                            <div class="admin-form-group">
                                <label class="admin-form-label">Latitude</label>
                                <input type="text" id="latitude" class="admin-form-input" value="-6.200000">
                            </div>
                            <div class="admin-form-group">
                                <label class="admin-form-label">Longitude</label>
                                <input type="text" id="longitude" class="admin-form-input" value="106.816666">
                            </div>
                        </div>
                        <div class="admin-form-group">
                            <label class="admin-form-label">Radius Toleransi (meter)</label>
                            <input type="number" id="radius" class="admin-form-input" value="50" min="10" max="500">
                        </div>

                        <!-- Map Preview -->
                        <div id="settingsMap"
                            style="height: 220px; border-radius: 10px; overflow: hidden; border: 1px solid #E2E8F0; margin-bottom: 16px;">
                        </div>
                        <div style="text-align: center; font-size: 0.75rem; color: #94A3B8; margin-bottom: 16px;">
                            Lat: <span id="previewLat">-6.200000</span>, Long: <span id="previewLng">106.816666</span>,
                            Radius: <span id="previewRadius">50</span>m
                        </div>

                        <button class="admin-btn admin-btn-primary" id="saveLocationBtn" style="width: 100%;">
                            Simpan Lokasi
                        </button>
                    </div>
                </div>

                <!-- Shift Configuration -->
                <div class="panel">
                    <div class="panel-header">
                        <h3 class="panel-title">⏰ Konfigurasi Shift</h3>
                    </div>
                    <div class="panel-body">
                        <div id="shiftList">
                            <!-- Filled by JS -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- Danger Zone -->
            <div class="panel" style="margin-top: 20px; border-color: rgba(239,68,68,0.3);">
                <div class="panel-header" style="border-bottom-color: rgba(239,68,68,0.2);">
                    <h3 class="panel-title" style="color: #DC2626;">⚠️ Zona Bahaya</h3>
                </div>
                <div class="panel-body">
                    <div style="display: flex; align-items: center; justify-content: space-between;">
                        <div>
                            <p style="font-weight: 600; color: #334155;">Reset Semua Data Wajah</p>
                            <p style="color: #94A3B8; font-size: 0.85rem;">Menghapus seluruh data biometrik wajah
                                pegawai. Semua pegawai harus registrasi ulang.</p>
                        </div>
                        <button class="admin-btn admin-btn-danger" id="dangerResetBtn">
                            Reset Semua
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/admin-app.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/settings.js"></script>
</body>

</html>
