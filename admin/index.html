<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Dashboard Admin — Sistem Absensi Klinik Prima Insani">
    <title>Dashboard — Admin Klinik Prima Insani</title>
    <link rel="icon" type="image/png" href="../shared/assets/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>
    <!-- Sidebar -->
    <div id="sidebarContainer"></div>

    <!-- Main Content -->
    <div class="main-content">
        <div id="topBarContainer"></div>

        <div class="page-container">
            <!-- Stat Cards -->
            <div class="stat-cards">
                <div class="stat-card">
                    <div class="stat-card-header">
                        <div>
                            <div class="stat-card-value" id="statTotal">0</div>
                            <div class="stat-card-label">Total Pegawai</div>
                        </div>
                        <div class="stat-card-icon teal">👥</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-header">
                        <div>
                            <div class="stat-card-value" id="statHadir" style="color: #22C55E;">0</div>
                            <div class="stat-card-label">Hadir Hari Ini</div>
                        </div>
                        <div class="stat-card-icon green">✅</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-header">
                        <div>
                            <div class="stat-card-value" id="statTelat" style="color: #F59E0B;">0</div>
                            <div class="stat-card-label">Terlambat</div>
                        </div>
                        <div class="stat-card-icon amber">⏰</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-header">
                        <div>
                            <div class="stat-card-value" id="statAlpa" style="color: #EF4444;">0</div>
                            <div class="stat-card-label">Alpa</div>
                        </div>
                        <div class="stat-card-icon red">❌</div>
                    </div>
                </div>
            </div>

            <!-- Holiday Alert (hidden by default) -->
            <div id="adminHolidayBanner"
                style="display: none; background: linear-gradient(135deg, #F59E0B11, #D9770611); border: 1px solid #F59E0B33; border-radius: 12px; padding: 14px 18px; margin-bottom: 20px; display: none;">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <span style="font-size: 1.3rem;">🏖️</span>
                    <div style="flex:1">
                        <span style="font-weight: 700; font-size: 0.85rem; color: #F59E0B;" id="adminHolidayName">Hari
                            Libur Nasional</span>
                        <span style="font-size: 0.8rem; color: #94A3B8; margin-left: 8px;">Data absensi mungkin kosong
                            hari ini</span>
                    </div>
                    <div id="adminUpcomingList" style="font-size: 0.75rem; color: #64748B;"></div>
                </div>
            </div>

            <!-- Charts Row -->
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px;">
                <!-- Donut Chart -->
                <div class="panel">
                    <div class="panel-header">
                        <h3 class="panel-title">Distribusi Kehadiran</h3>
                        <span style="color: #94A3B8; font-size: 0.8rem;">Hari Ini</span>
                    </div>
                    <div class="panel-body">
                        <div class="chart-container" style="height: 240px;">
                            <canvas id="donutChart"></canvas>
                        </div>
                    </div>
                </div>

                <!-- Bar Chart -->
                <div class="panel">
                    <div class="panel-header">
                        <h3 class="panel-title">Tren Minggu Ini</h3>
                        <span style="color: #94A3B8; font-size: 0.8rem;">5 Hari Terakhir</span>
                    </div>
                    <div class="panel-body">
                        <div class="chart-container" style="height: 240px;">
                            <canvas id="barChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Live Timeline -->
            <div class="panel">
                <div class="panel-header">
                    <h3 class="panel-title">Timeline Absensi Hari Ini</h3>
                    <a href="absensi.html"
                        style="color: #0D9488; font-size: 0.85rem; text-decoration: none; font-weight: 500;">Lihat Semua
                        →</a>
                </div>
                <div class="panel-body">
                    <div class="timeline" id="timeline">
                        <!-- Filled by JS -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/admin-app.js"></script>
    <script src="js/charts.js"></script>
    <script>
        if (!AdminAPI.isAuthenticated()) { window.location.href = 'login.html'; }

        // Render layout
        document.getElementById('sidebarContainer').innerHTML = AdminApp.renderSidebar('dashboard');
        document.getElementById('topBarContainer').innerHTML = AdminApp.renderTopBar('Dashboard');

        loadDashboard();

        async function loadDashboard() {
            try {
                const result = await AdminAPI.getTodayStats();
                const stats = result.stats;
                document.getElementById('statTotal').textContent = stats.totalPegawai;
                document.getElementById('statHadir').textContent = stats.hadir;
                document.getElementById('statTelat').textContent = stats.terlambat;
                document.getElementById('statAlpa').textContent = stats.alpa;

                // Charts
                Charts.renderAttendanceDonut('donutChart', stats);
                Charts.renderWeeklyBar('barChart');

                // Timeline
                renderTimeline(result.data || []);
            } catch (err) {
                console.error('Dashboard load error:', err);
            }

            // Holiday check
            try {
                const holidayCheck = await AdminAPI.checkHoliday();
                if (holidayCheck.isHoliday) {
                    const banner = document.getElementById('adminHolidayBanner');
                    banner.style.display = 'block';
                    document.getElementById('adminHolidayName').textContent = holidayCheck.name;
                }

                // Show next holiday
                const holidays = await AdminAPI.getHolidays();
                const today = new Date().toISOString().split('T')[0];
                const next = (holidays.data || []).find(h => h.date > today);
                if (next) {
                    const months = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];
                    const d = new Date(next.date + 'T00:00:00');
                    document.getElementById('adminUpcomingList').textContent =
                        `Libur berikutnya: ${next.name} (${d.getDate()} ${months[d.getMonth()]})`;
                }
            } catch (err) { console.warn('Holiday:', err); }
        }

        function renderTimeline(records) {
            const container = document.getElementById('timeline');
            const recent = records.slice(0, 10);

            if (recent.length === 0) {
                container.innerHTML = '<p style="color: #94A3B8; font-size: 0.875rem;">Belum ada aktivitas hari ini</p>';
                return;
            }

            container.innerHTML = recent.map(r => {
                const isMasuk = r.tipe_absen === 'MASUK';
                const dotColor = isMasuk ? (r.status_kehadiran === 'Terlambat' ? 'amber' : 'green') : 'blue';
                const label = isMasuk ? 'Clock In' : 'Clock Out';
                const statusText = isMasuk ? ` — ${r.status_kehadiran}` : '';

                return `
          <div class="timeline-item">
            <div class="timeline-dot ${dotColor}"></div>
            <div class="timeline-content">
              <strong>${r.nama_pegawai || '-'}</strong> ${label}${statusText}
            </div>
            <div class="timeline-time">${AdminApp.formatTime(r.waktu_absen)}</div>
          </div>
        `;
            }).join('');
        }
    </script>
</body>

</html>
