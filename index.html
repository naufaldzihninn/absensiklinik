<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absensi — Klinik Prima Insani</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0F172A;
            color: #E2E8F0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            padding: 40px 24px;
        }

        .logo {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        p {
            color: #94A3B8;
            font-size: 0.9rem;
            margin-bottom: 32px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 300px;
            margin: 0 auto;
        }

        a {
            display: block;
            padding: 14px 24px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        a:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .btn-pegawai {
            background: linear-gradient(135deg, #6366F1, #8B5CF6);
            color: white;
        }

        .btn-admin {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #E2E8F0;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo">🏥</div>
        <h1>Klinik Prima Insani</h1>
        <p>Sistem Absensi Cerdas</p>
        <div class="links">
            <a href="pegawai/login.html" class="btn-pegawai">📱 Masuk Pegawai</a>
            <a href="admin/login.html" class="btn-admin">🔒 Panel Admin</a>
        </div>
    </div>
</body>

</html>
