<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Data Absensi — Admin Klinik Prima Insani">
    <title>Absensi — Admin Klinik Prima Insani</title>
    <link rel="icon" type="image/png" href="../shared/assets/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>
    <div id="sidebarContainer"></div>

    <div class="main-content">
        <div id="topBarContainer"></div>

        <div class="page-container">
            <!-- Filters -->
            <div
                style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px;">
                <div class="filter-row">
                    <div class="search-bar">
                        <span>🔍</span>
                        <input type="text" id="searchInput" placeholder="Cari nama pegawai..."
                            >
                    </div>
                    <input type="date" id="dateFrom" class="filter-select">
                    <span style="color: #94A3B8; font-size: 0.85rem;">s/d</span>
                    <input type="date" id="dateTo" class="filter-select">
                    <select id="statusFilter" class="filter-select">
                        <option value="">Semua Status</option>
                        <option value="Tepat Waktu">Tepat Waktu</option>
                        <option value="Terlambat">Terlambat</option>
                    </select>
                </div>
                <div style="display: flex; gap: 8px;">
                    <button class="admin-btn admin-btn-outline" id="exportExcelBtn">
                        📊 Export Excel
                    </button>
                    <button class="admin-btn admin-btn-outline" id="exportPdfBtn">
                        📄 Export PDF
                    </button>
                </div>
            </div>

            <!-- Attendance Table -->
            <div class="panel">
                <div class="panel-header">
                    <h3 class="panel-title">Data Absensi</h3>
                    <span style="color: #94A3B8; font-size: 0.8rem;" id="recordCount">0 catatan</span>
                </div>
                <div class="panel-body-flush">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Nama Pegawai</th>
                                <th>Tanggal</th>
                                <th>Shift</th>
                                <th>Tipe</th>
                                <th>Waktu</th>
                                <th>Status</th>
                                <th>Akurasi AI</th>
                                <th>Jarak</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="attendanceTableBody">
                            <!-- Filled by JS -->
                        </tbody>
                    </table>
                </div>
                <!-- Pagination -->
                <div class="pagination">
                    <div class="pagination-info" id="paginationInfo">Menampilkan 1-20 dari 0</div>
                    <div class="pagination-buttons" id="paginationButtons">
                        <!-- Filled by JS -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Map Modal -->
    <div class="modal-overlay" id="mapModal">
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header">
                <h3 id="mapModalTitle">Lokasi Absensi</h3>
                <button class="modal-close" id="closeMapModalBtn">✕</button>
            </div>
            <div class="modal-body">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;">
                    <div>
                        <div style="color: #64748B; font-size: 0.8rem;">Koordinat</div>
                        <div style="font-weight: 600; font-size: 0.9rem;" id="mapCoords">-</div>
                    </div>
                    <div>
                        <div style="color: #64748B; font-size: 0.8rem;">Jarak dari Klinik</div>
                        <div style="font-weight: 600; font-size: 0.9rem;" id="mapDistance">-</div>
                    </div>
                    <div>
                        <div style="color: #64748B; font-size: 0.8rem;">Akurasi Wajah</div>
                        <div style="font-weight: 600; font-size: 0.9rem; color: #22C55E;" id="mapAccuracy">-</div>
                    </div>
                    <div>
                        <div style="color: #64748B; font-size: 0.8rem;">Waktu</div>
                        <div style="font-weight: 600; font-size: 0.9rem;" id="mapTime">-</div>
                    </div>
                </div>
                <div id="mapContainer"
                    style="height: 300px; border-radius: 10px; overflow: hidden; border: 1px solid #E2E8F0;"></div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/admin-app.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <script src="js/absensi.js"></script>
</body>

</html>
