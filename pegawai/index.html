<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0F172A">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Dashboard Absensi Klinik Prima Insani — Beranda Pegawai">
    <title>Beranda — Absensi Klinik Prima Insani</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="../shared/assets/logo.png">
    <link rel="apple-touch-icon" href="../shared/assets/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="app-container">
        <div class="page-content">

            <!-- Greeting Header -->
            <div class="greeting-header">
                <p class="greeting-text" id="greetingText">Selamat Pagi 👋</p>
                <h1 class="greeting-name" id="greetingName">...</h1>
            </div>

            <!-- Clock & Date -->
            <div class="glass-card" style="text-align: center; margin-bottom: 20px;">
                <div class="clock-display" id="liveClock">--:--</div>
                <p class="clock-date" id="liveDate">...</p>
            </div>

            <!-- Holiday Banner (hidden by default) -->
            <div id="holidayBanner"
                style="display: none; background: linear-gradient(135deg, #F59E0B22, #D9770622); border: 1px solid #F59E0B44; border-radius: 14px; padding: 14px 16px; margin-bottom: 20px;">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <span style="font-size: 1.5rem;">🏖️</span>
                    <div>
                        <div style="font-weight: 700; font-size: 0.85rem; color: #FBBF24;" id="holidayName">Hari Libur
                        </div>
                        <div style="font-size: 0.75rem; color: #94A3B8;">Absensi tetap berjalan meskipun hari libur
                        </div>
                    </div>
                </div>
            </div>

            <!-- Upcoming Holidays -->
            <div id="upcomingHolidays" style="display: none; margin-bottom: 20px;">
                <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;">
                    <span style="font-size: 0.85rem; font-weight: 600; color: #CBD5E1;">📅 Libur Mendatang</span>
                </div>
                <div id="holidayList" style="display: flex; flex-direction: column; gap: 8px;"></div>
            </div>

            <!-- Today's Status Card -->
            <div class="status-card" id="statusCard">
                <div class="flex items-center justify-between mb-sm">
                    <span class="text-sm" style="opacity: 0.85;">Status Hari Ini</span>
                    <span class="badge badge-info" id="statusBadge">Memuat...</span>
                </div>
                <h2 id="statusTitle" style="margin-top: 8px;">Memuat...</h2>
                <p class="text-sm" id="statusDetail" style="opacity: 0.8; margin-top: 4px;"></p>
            </div>

            <!-- GPS Status -->
            <div class="flex justify-center" style="margin: 20px 0;">
                <div class="gps-status in-range" id="gpsStatus">
                    <span class="gps-dot"></span>
                    <span id="gpsText">Memeriksa lokasi...</span>
                </div>
            </div>

            <!-- Clock In / Out Buttons -->
            <div class="action-row" id="actionButtons">
                <button class="quick-action-btn clock-in" id="clockInBtn" disabled>
                    <span class="action-icon">📥</span>
                    Clock In
                </button>
                <button class="quick-action-btn clock-out" id="clockOutBtn" disabled>
                    <span class="action-icon">📤</span>
                    Clock Out
                </button>
            </div>

            <!-- Recent History -->
            <div class="section-header" style="margin-top: 28px;">
                <h3 class="section-title">Riwayat Terkini</h3>
                <a href="riwayat.html" class="section-link">Lihat Semua →</a>
            </div>

            <div id="recentHistory">
                <!-- Filled by JS -->
            </div>

        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="index.html" class="nav-item active" data-page="home">
                <span class="nav-icon">🏠</span>
                Beranda
            </a>
            <a href="riwayat.html" class="nav-item" data-page="riwayat">
                <span class="nav-icon">📋</span>
                Riwayat
            </a>
            <a href="profil.html" class="nav-item" data-page="profil">
                <span class="nav-icon">👤</span>
                Profil
            </a>
        </nav>
    </div>

    <script src="js/app.js"></script>
    <script src="js/api.js"></script>
    <script src="js/geolocation.js"></script>
    <script src="js/index.js"></script>
</body>

</html>
