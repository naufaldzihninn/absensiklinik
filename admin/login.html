<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Admin Login — Sistem Absensi Klinik Prima Insani">
    <title>Admin Login — Klinik Prima Insani</title>
    <link rel="icon" type="image/png" href="../shared/assets/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>
    <div class="admin-login-page">
        <div class="admin-login-card">
            <div class="admin-login-logo">
                <img src="../shared/assets/logo.png" alt="Logo">
                <div class="admin-login-logo-text">
                    <h2>Klinik Prima Insani</h2>
                    <p>Admin Dashboard</p>
                </div>
            </div>

            <form id="loginForm" autocomplete="off">
                <div class="admin-form-group">
                    <label class="admin-form-label" for="username">Username</label>
                    <input type="text" id="username" class="admin-form-input" placeholder="Masukkan username" required
                        autocomplete="username">
                </div>

                <div class="admin-form-group">
                    <label class="admin-form-label" for="password">Password</label>
                    <input type="password" id="password" class="admin-form-input" placeholder="Masukkan password"
                        required autocomplete="current-password">
                </div>

                <button type="submit" class="admin-btn admin-btn-primary" id="loginBtn"
                    style="width: 100%; padding: 12px; font-size: 1rem; margin-top: 8px;">
                    Masuk
                </button>
            </form>

            <p style="text-align: center; color: #94A3B8; font-size: 0.8rem; margin-top: 24px;">
                Hanya untuk admin yang berwenang
            </p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/admin-app.js"></script>
    <script src="js/login.js"></script>
</body>

</html>
