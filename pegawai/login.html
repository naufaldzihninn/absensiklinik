<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0F172A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Sistem Absensi Cerdas Klinik Prima Insani — Login Pegawai">
  <title>Login — Absensi Klinik Prima Insani</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="../shared/assets/logo.png">
  <link rel="apple-touch-icon" href="../shared/assets/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="login-page" id="loginPage">
    <!-- Logo -->
    <div class="login-logo">
      <img src="../shared/assets/logo.png" alt="Logo Klinik Prima Insani">
    </div>

    <h1 class="login-title text-gradient">Klinik Prima Insani</h1>
    <p class="login-subtitle">Sistem Absensi Cerdas</p>

    <!-- Login Form -->
    <div class="login-card glass-card">
      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <div class="input-icon-wrapper">
            <span class="input-icon">👤</span>
            <input type="text" id="username" class="form-input" placeholder="Masukkan username" required
              autocomplete="username">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-icon-wrapper">
            <span class="input-icon">🔒</span>
            <input type="password" id="password" class="form-input" placeholder="Masukkan password" required
              autocomplete="current-password">
          </div>
        </div>

        <!-- Ingat Saya -->
        <div id="rememberToggle" style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px; cursor: pointer;">
          <input type="checkbox" id="rememberMe" checked
            style="width: 18px; height: 18px; accent-color: var(--primary); cursor: pointer; border-radius: 4px;">
          <label for="rememberMe"
            style="font-size: 0.9rem; color: var(--text-secondary); cursor: pointer; user-select: none;">
            Ingat Saya
          </label>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginBtn">
          <span id="loginText">Masuk</span>
          <div class="spinner spinner-sm" id="loginSpinner" style="display: none;"></div>
        </button>
      </form>

      <p class="text-center text-muted text-sm" style="margin-top: 20px;">
        Hubungi admin jika Anda belum memiliki akun
      </p>
    </div>

    <!-- Version -->
    <p class="text-muted text-xs" style="margin-top: 32px;">v1.0.0</p>
  </div>

  <script src="js/app.js"></script>
  <script src="js/api.js"></script>
  <script src="js/login.js"></script>
</body>

</html>
