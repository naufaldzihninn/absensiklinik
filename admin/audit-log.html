<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Audit Log — Admin Klinik Prima Insani">
    <title>Audit Log — Admin Klinik Prima Insani</title>
    <link rel="icon" type="image/png" href="../shared/assets/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>
    <div id="sidebarContainer"></div>

    <div class="main-content">
        <div id="topBarContainer"></div>

        <div class="page-container">
            <!-- Filters -->
            <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap;">
                <select id="actionFilter" class="filter-select">
                    <option value="">Semua Aksi</option>
                    <option value="CREATE_PEGAWAI">Tambah Pegawai</option>
                    <option value="RESET_WAJAH">Reset Wajah</option>
                    <option value="UPDATE_SETTING">Update Setting</option>
                    <option value="DEACTIVATE_PEGAWAI">Nonaktifkan Pegawai</option>
                </select>
            </div>

            <!-- Audit Log Table -->
            <div class="panel">
                <div class="panel-header">
                    <h3 class="panel-title">📝 Log Aktivitas Admin</h3>
                    <span style="color: #94A3B8; font-size: 0.8rem;" id="logCount">0 catatan</span>
                </div>
                <div class="panel-body-flush">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Waktu</th>
                                <th>Admin</th>
                                <th>Aksi</th>
                                <th>Detail</th>
                            </tr>
                        </thead>
                        <tbody id="auditLogBody">
                            <!-- Filled by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/admin-app.js"></script>
    <script src="js/audit-log.js"></script>
</body>

</html>
