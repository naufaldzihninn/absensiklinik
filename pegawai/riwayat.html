<body>
    <div class="app-container">
        <div class="page-content">

            <!-- Header -->
            <h2 style="margin-bottom: 20px;">📋 Riwayat Absensi</h2>

            <!-- Month Selector -->
            <div class="month-selector">
                <button class="month-nav-btn" id="prevMonth">‹</button>
                <span class="month-label" id="monthLabel">Maret 2026</span>
                <button class="month-nav-btn" id="nextMonth">›</button>
            </div>

            <!-- Monthly Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value success" id="statHadir">0</div>
                    <div class="stat-label">Hadir</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value warning" id="statTelat">0</div>
                    <div class="stat-label">Terlambat</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value danger" id="statAlpa">0</div>
                    <div class="stat-label">Alpa</div>
                </div>
            </div>

            <!-- Attendance Records -->
            <div id="attendanceList" style="margin-top: 20px;">
                <!-- Filled by JS -->
            </div>

        </div>
